apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: paperlessngx
  namespace: paperlessngx
spec:
  interval: 5m
  chart:
    spec:
      chart: paperless-ngx
      version: 14.7.1
      sourceRef:
        kind: HelmRepository
        name: paperlessngx
        namespace: flux-system
      interval: 5m
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/paperless-ngx/values.yaml
  values:
    image:
      repository: harbor.homelab.rivetcode.com/ghcr-proxy/paperless-ngx/paperless-ngx
    gotenbergImage:
      repository: harbor.homelab.rivetcode.com/dockerhub-proxy/gotenberg/gotenberg
    tikaImage:
      repository: harbor.homelab.rivetcode.com/dockerhub-proxy/apache/tika
    persistence:
      data:
        enabled: true
        storageClass: "longhorn-ha-2"
        size: 5Gi
        labels:
          recurring-job.longhorn.io/source: enabled
          recurring-job-group.longhorn.io/backup: enabled
      consume:
        enabled: true
        storageClass: "longhorn-ha-2"
        size: 500Mi
        labels:
          recurring-job.longhorn.io/source: enabled
          recurring-job-group.longhorn.io/backup: enabled
      media:
        enabled: true
        storageClass: "longhorn-ha-2"
        size: 10Gi
        labels:
          recurring-job.longhorn.io/source: enabled
          recurring-job-group.longhorn.io/backup: enabled
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                PAPERLESS_URL: "https://paperlessngx.homelab.rivetcode.com"
                PAPERLESS_DISABLE_REGULAR_LOGIN: "true"
