apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config-mlflow
  namespace: kube-system
spec:
  interval: 5m
  dependsOn:
  - name: mlflow
  path: ./configs/
  prune: true # remove any elements later removed from the above path
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: mlflow-configs
  retryInterval: 1m
