apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kuberay-cluster
  namespace: kuberay-operator
spec:
  interval: 5m
  path: ./clusters/home/apps/kuberay-operator/kuberay-operator/cluster/
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
