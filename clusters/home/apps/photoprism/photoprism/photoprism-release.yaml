apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: photoprism
  namespace: photoprism
spec:
  interval: 5m
  chart:
    spec:
      chart: ./   # path inside the repo
      sourceRef:
        kind: GitRepository
        name: photoprism
        namespace: flux-system
  # https://github.com/firefly2442/photoprism-helm-chart/blob/master/values.yaml
  values:
    image:
      repository: photoprism/photoprism
      pullPolicy: IfNotPresent
      # https://hub.docker.com/r/photoprism/photoprism/tags
      tag: "260305"
    persistence:
      enabled: true
      # Main storage (database, cache, sidecar data)
      storage:
        enabled: true
        size: 50Gi
        storageClass: longhorn-ha-3
        labels:
          recurring-job.longhorn.io/source: enabled
          recurring-job-group.longhorn.io/backup: enabled
      # Originals (where photos are stored)
      originals:
        enabled: true
        size: 250Gi
        storageClass: longhorn-ha-3
        labels:
          recurring-job.longhorn.io/source: enabled
          recurring-job-group.longhorn.io/backup: enabled
      # Imports (temporary import folder)
      import:
        enabled: true
        size: 25Gi
        storageClass: longhorn-ha-2
        labels:
          recurring-job.longhorn.io/source: enabled
          recurring-job-group.longhorn.io/backup: enabled
    mariadb:
      persistence:
        enabled: true
        size: 5Gi
        storageClass: longhorn-ha-3
        labels:
          recurring-job.longhorn.io/source: enabled
          recurring-job-group.longhorn.io/backup: enabled
    env:
      # warning, this opens your deployment up to anyone, be careful!
      # we're protecting the endpoint with Authentik so we're OK
      - name: PHOTOPRISM_AUTH_MODE
        value: "public"
