apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: navidrome
spec:
  interval: 5m
  chart:
    spec:
      chart: navidrome
      version: 23.4.0
      sourceRef:
        kind: HelmRepository
        name: navidrome
        namespace: flux-system
      interval: 5m
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/navidrome/values.yaml
  values:
    env:
      # https://www.navidrome.org/docs/usage/admin/insights/
      # disable telemetry collection
      ND_ENABLEINSIGHTSCOLLECTOR: false
    persistence:
      data:
        enabled: true
        size: 1Gi
      music:
        enabled: true
        size: 10Gi
