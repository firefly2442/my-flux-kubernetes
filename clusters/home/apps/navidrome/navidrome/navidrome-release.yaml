apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: navidrome
  namespace: navidrome
spec:
  interval: 5m
  chart:
    spec:
      chart: navidrome
      version: 23.4.0
      sourceRef:
        kind: HelmRepository
        name: navidrome
        namespace: flux-system
      interval: 5m
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/navidrome/values.yaml
  values:
    # https://www.navidrome.org/docs/usage/admin/insights/
    # disable telemetry collection
    workload:
      main:
        podSpec:
          containers:
            main:
              env:
                ND_ENABLEINSIGHTSCOLLECTOR: "false"
    persistence:
      data:
        enabled: true
        size: 1Gi
        labels:
          recurring-job.longhorn.io/source: "enabled"
          recurring-job-group.longhorn.io/backup: enabled
      music:
        enabled: true
        size: 10Gi
        labels:
          recurring-job.longhorn.io/source: "enabled"
          recurring-job-group.longhorn.io/backup: enabled
