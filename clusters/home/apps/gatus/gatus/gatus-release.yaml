apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
  namespace: gatus
spec:
  interval: 5m
  chart:
    spec:
      chart: gatus
      # https://twin.github.io/helm-charts/index.yaml
      version: '1.5.0'
      sourceRef:
        kind: HelmRepository
        name: gatus
        namespace: flux-system
      interval: 5m
  # https://github.com/TwiN/helm-charts/blob/master/charts/gatus/values.yaml
  values:
    service:
      type: ClusterIP
    persistence:
      enabled: false
    # Gatus configuration
    # https://github.com/TwiN/gatus#configuration
    config:
      endpoints:
        # <service-name>.<namespace>.svc.cluster.local
        - name: podinfo-external
          url: https://podinfo.homelab.rivetcode.com
          interval: 60s
          conditions:
            - "[STATUS] == 200"
        - name: podinfo-internal
          url: http://podinfo.podinfo.svc.cluster.local
          interval: 60s
          conditions:
            - "[STATUS] == 200"
        - name: authentik-external
          url: https://authentik.homelab.rivetcode.com
          interval: 60s
          conditions:
            - "[STATUS] == 200"
        - name: authentik-internal
          url: http://authentik-server.authentik.svc.cluster.local
          interval: 60s
          conditions:
            - "[STATUS] == 200"
        - name: longhorn-external
          url: https://longhorn.homelab.rivetcode.com
          interval: 60s
          conditions:
            - "[STATUS] == 200"
        - name: longhorn-internal
          url: http://longhorn-frontend.longhorn-system.svc.cluster.local
          interval: 60s
          conditions:
            - "[STATUS] == 200"
        - name: gitea-external
          url: https://gitea.homelab.rivetcode.com
          interval: 60s
          conditions:
            - "[STATUS] == 200"
        - name: gitea-internal
          url: http://gitea-http.gitea.svc.cluster.local:3000
          interval: 60s
          conditions:
            - "[STATUS] == 200"
        # - name: headlamp-external
        #   url: https://headlamp.homelab.rivetcode.com
        #   interval: 60s
        #   conditions:
        #     - "[STATUS] == 200"
        # - name: headlamp-internal
        #   url: http://headlamp.headlamp.svc.cluster.local
        #   interval: 60s
        #   conditions:
        #     - "[STATUS] == 200"
        - name: kubernetes-dashboard-external
          url: https://kubernetes-dashboard.homelab.rivetcode.com
          interval: 60s
          conditions:
            - "[STATUS] == 200"
        - name: kubernetes-dashboard-internal
