apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config-steam-analysis
  namespace: kube-system
spec:
  interval: 5m
  dependsOn:
  - name: steam-analysis
  path: ./configs/
  prune: true # remove any elements later removed from the above path
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: steam-analysis-configs
  retryInterval: 1m
