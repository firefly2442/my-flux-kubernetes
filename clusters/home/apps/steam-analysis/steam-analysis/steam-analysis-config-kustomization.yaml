apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: steam-analysis-config
  namespace: steam-analysis
spec:
  interval: 5m
  path: ./clusters/home/apps/steam-analysis/steam-analysis/configs/
  prune: true # remove any elements later removed from the above path
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
