apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: memos
  namespace: memos
spec:
  interval: 5m
  chart:
    spec:
      chart: .
      sourceRef:
        kind: GitRepository
        name: memos
        namespace: flux-system
      interval: 5m
  # https://github.com/usememos/helm/blob/main/values.yaml
  values:
    image:
      repo: harbor.homelab.rivetcode.com/ghcr-proxy
      imageName: usememos/memos
      # https://github.com/usememos/memos/releases
      tag: "0.28.0"
    persistence:
      # If enabled is False, emptyDir will be used, data may be lost after Pod rebuild, it is recommended to use persistent volume
      enabled: true
      storageClass: "longhorn-ha-2"
      labels:
        recurring-job.longhorn.io/source: enabled
        recurring-job-group.longhorn.io/backup: enabled
      accessMode: ReadWriteOnce
      size: 1Gi
