apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: litellm-config
  namespace: litellm
spec:
  interval: 5m
  path: ./clusters/home/apps/litellm/litellm/configs/
  prune: true # remove any elements later removed from the above path
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
