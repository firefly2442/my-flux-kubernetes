apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: karakeep
  namespace: karakeep
spec:
  interval: 5m
  chart:
    spec:
      chart: karakeep
      version: '0.32.0'
      sourceRef:
        kind: HelmRepository
        name: karakeep
        namespace: flux-system
      interval: 5m
  # https://github.com/karakeep-app/helm-charts/blob/main/charts/karakeep/values.yaml
  values:
    meilisearch:
      environment:
        MEILI_ENV: production
        # https://www.meilisearch.com/docs/resources/help/telemetry#environment-variable
        # turn off telemetry
        MEILI_NO_ANALYTICS: true
      persistence:
        enabled: true
        size: 1Gi
        storageClass: "longhorn-ha-2"
        labels:
          recurring-job.longhorn.io/source: enabled
          recurring-job-group.longhorn.io/backup: enabled
