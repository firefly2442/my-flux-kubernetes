apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
spec:
  interval: 5m
  chart:
    spec:
      chart: audiobookshelf
      version: 13.4.0
      sourceRef:
        kind: HelmRepository
        name: audiobookshelf
        namespace: flux-system
      interval: 5m
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/audiobookshelf/values.yaml
  values:
    persistence:
      config:
        enabled: true
        size: 1Gi
      audiobooks:
        enabled: true
        size: 10Gi
      metadata:
        enabled: true
        size: 5Gi
