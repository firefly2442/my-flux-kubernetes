apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config-openwebui
  namespace: kube-system
spec:
  interval: 10m
  dependsOn:
  - name: openwebui
  path: ./configs/
  prune: true # remove any elements later removed from the above path
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: openwebui-configs
  retryInterval: 1m
