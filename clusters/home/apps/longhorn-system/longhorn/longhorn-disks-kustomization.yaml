apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-disks
  namespace: longhorn-system
spec:
  interval: 5m
  path: ./clusters/home/apps/longhorn-system/longhorn/disks
  prune: true
  wait: true # wait until longhorn is fully deployed
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
