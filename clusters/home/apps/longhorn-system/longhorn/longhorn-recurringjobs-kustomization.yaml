apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-recurringjobs
  namespace: longhorn-system
spec:
  interval: 10m
  path: ./recurringjobs/
  prune: true
  dependsOn:
    - name: longhorn
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
