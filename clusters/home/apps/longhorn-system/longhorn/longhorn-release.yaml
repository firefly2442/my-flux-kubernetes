apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 5m
  chart:
    spec:
      chart: longhorn
      # when longhorn is updated, you may need to go into the UI and upgrade the engine on existing PVCs
      version: '1.11.2'
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 5m
  values:
    # see stock version
    # https://github.com/longhorn/longhorn/blob/master/chart/values.yaml
    metrics:
      ServiceMonitor:
        enabled: true
    service:
      ui:
        type: ClusterIP
    defaultSettings:
      createDefaultDiskLabeledNodes: false
      recurringSuccessfulJobsHistoryLimit: 3
      recurringFailedJobsHistoryLimit: 3
    recurringJobs:
      enabled: true
      jobs:
        - name: hourly-snapshot
          task: snapshot
          cron: "0 * * * *"
          retain: 24
          concurrency: 1
          labels:
            backup: enabled
        - name: daily-backup
          task: backup
          cron: "0 3 * * *"
          retain: 7
          concurrency: 1
          labels:
            backup: enabled
        - name: weekly-backup
          task: backup
          cron: "0 4 * * 0"
          retain: 4
          concurrency: 1
          labels:
            backup: enabled
    # https://longhorn.io/docs/1.11.2/snapshots-and-backups/backup-and-restore/set-backup-target/
    defaultBackupStore:
      backupTarget: "s3://longhorn@seaweedfs/"
      # Name of the Kubernetes secret associated with the default backup target.
      backupTargetCredentialSecret: "longhorn-backup-s3-secret"
    persistence:
      defaultClass: true
      defaultFsType: ext4
