apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: twingate
  namespace: twingate
spec:
  interval: 5m
  chart:
    spec:
      chart: connector
      version: '0.1.35'
      sourceRef:
        kind: HelmRepository
        name: twingate
        namespace: flux-system
      interval: 5m
  # https://github.com/Twingate/helm-charts/blob/master/stable/connector/values.yaml
  values:
    image:
      tag: "1.89.0"
    metrics:
      enabled: true
    connector:
      existingSecret: "twingate-token-secret"
      network: "firefly2442"
