apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true # default, enable ingress
    traefik: true # enable traefik ingressRoute
    gateway: true # enable gateway-api
  settings.yaml: ""
  #settings.yaml: |
  #  providers:
  #    longhorn:
  #      url: https://longhorn.my.network
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: ""
  services.yaml: |
    - Kubernetes:
        - Traefik:
            href: https://traefik.homelab.rivetcode.com
            description: Traefik
            icon: traefik.png
        - Kubernetes HAProxy:
            href: http://192.168.1.226:8404/stats
            description: Kubernetes HAProxy
            icon: haproxy.png
    - Homelab:
        - Heimdall:
            href: https://portal.homelab.rivetcode.com
            description: Heimdall
            icon: heimdall.png
        - Pi-hole Primary:
            href: http://192.168.1.226:8095/admin
            description: Pi-hole
            icon: pi-hole.png
        - Pi-hole Secondary:
            href: http://192.168.1.114:8090/admin
            description: Pi-hole
            icon: pi-hole.png
        - Bitwarden:
            href: https://192.168.1.226:9443/
            description: Bitwarden
            icon: bitwarden.png
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
  docker.yaml: ""
