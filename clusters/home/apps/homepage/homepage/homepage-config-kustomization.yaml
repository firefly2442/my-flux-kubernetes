apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homepage-config
  namespace: homepage
spec:
  interval: 5m
  path: ./clusters/home/apps/homepage/homepage/configs/
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
