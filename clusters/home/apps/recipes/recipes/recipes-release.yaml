apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: my-recipes-cooklang
  namespace: recipes
spec:
  interval: 5m
  chart:
    spec:
      chart: ./chart  # relative path in the repo
      sourceRef:
        kind: GitRepository
        name: my-recipes-cooklang
        namespace: flux-system
  # https://github.com/firefly2442/my-recipes-cooklang/blob/master/chart/values.yaml
  values:
    image:
      repository: harbor.homelab.rivetcode.com/ghcr-proxy/firefly2442/my-recipes-cooklang
