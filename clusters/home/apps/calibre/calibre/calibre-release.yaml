apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: calibre
  namespace: calibre
spec:
  interval: 5m
  chart:
    spec:
      chart: calibre
      version: 20.6.0
      sourceRef:
        kind: HelmRepository
        name: calibre
        namespace: flux-system
      interval: 5m
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/calibre/values.yaml
  values:
    persistence:
      config:
        enabled: true
        size: 1Gi
        storageClass: "longhorn-ha-2"
