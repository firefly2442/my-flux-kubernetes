apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-ip
  namespace: metallb-system
spec:
  interval: 5m
  path: ./clusters/home/apps/metallb-system/metallb/ip/
  prune: true # remove any elements later removed from the above path
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
