apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: searxng
  namespace: searxng
spec:
  interval: 5m
  chart:
    spec:
      chart: searxng
      version: 11.3.4
      sourceRef:
        kind: HelmRepository
        name: searxng
        namespace: flux-system
      interval: 5m
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/searxng/values.yaml
  values:
    image:
      repository: harbor.homelab.rivetcode.com/dockerhub-proxy/searxng/searxng
    config:
      use_default_settings: true
      search:
        formats:
          - html
          - json
    persistence:
      config:
        enabled: true
        mountPath: /etc/searxng
        size: 500Mi
        storageClass: "longhorn-ha-2"
