apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: rabbitmq-config
  namespace: rabbitmq
spec:
  interval: 5m
  path: ./clusters/home/apps/rabbitmq/rabbitmq/configs/
  prune: true
  dependsOn:
    - name: rabbitmq
      namespace: rabbitmq
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
