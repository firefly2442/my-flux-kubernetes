apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metube
  namespace: metube
spec:
  interval: 5m
  chart:
    spec:
      chart: metube
      version: 18.4.0
      sourceRef:
        kind: HelmRepository
        name: metube
        namespace: flux-system
      interval: 5m
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/metube/values.yaml
  values:
    persistence:
      downloads:
        enabled: true
        size: 20Gi
        mountPath: /downloads
      config:
        enabled: true
        size: 1Gi
        mountPath: /config
