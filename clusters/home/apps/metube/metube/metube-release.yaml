apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metube
  namespace: metube
spec:
  interval: 5m
  chart:
    spec:
      chart: metube
      version: 18.10.8
      sourceRef:
        kind: HelmRepository
        name: metube
        namespace: flux-system
      interval: 5m
  # https://github.com/trueforge-org/truecharts/blob/master/charts/stable/metube/values.yaml
  values:
    image:
      repository: harbor.homelab.rivetcode.com/ghcr-proxy/alexta69/metube
    persistence:
      downloads:
        enabled: true
        storageClass: "longhorn-ha-2"
        size: 20Gi
      config:
        enabled: true
        storageClass: "longhorn-ha-2"
        size: 1Gi
