apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: config-metube
  namespace: kube-system
spec:
  interval: 10m
  dependsOn:
  - name: metube
  path: ./configs/
  prune: true # remove any elements later removed from the above path
  timeout: 2m
  sourceRef:
    kind: GitRepository
    name: metube-configs
  retryInterval: 1m
