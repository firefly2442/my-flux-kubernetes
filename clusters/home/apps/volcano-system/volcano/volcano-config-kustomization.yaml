apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: volcano-config
  namespace: volcano-system
spec:
  interval: 5m
  path: ./clusters/home/apps/volcano-system/volcano/configs/
  prune: true # remove any elements later removed from the above path
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
