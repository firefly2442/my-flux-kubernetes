apiVersion: apps/v1
kind: Deployment
metadata:
  name: volcano-dashboard
  namespace: volcano-system
  labels:
    app: volcano-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: volcano-dashboard
  template:
    metadata:
      labels:
        app: volcano-dashboard
    spec:
      securityContext:
        seLinuxOptions:
          level: s0:c123,c456
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: volcano-dashboard
      containers:
        - name: volcano-dashboard
          image: volcanosh/vc-dashboard-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: frontend
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: K8S_SKIP_TLS_VERIFY
              value: "false"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            runAsNonRoot: true
            runAsUser: 1000
