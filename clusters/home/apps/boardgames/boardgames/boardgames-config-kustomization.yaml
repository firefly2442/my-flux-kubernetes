apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: boardgames-config
  namespace: boardgames
spec:
  interval: 5m
  path: ./clusters/home/apps/boardgames/boardgames/configs/
  prune: true # remove any elements later removed from the above path
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
